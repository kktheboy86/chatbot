<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ANZ Analyst Bot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main class="app">
      <aside class="sidebar" aria-label="Navigation tabs">
        <h1 class="sidebar-title">Tools</h1>
        <button class="tab-button active" data-tab="chatbot" type="button">
          Chatbot
        </button>
        <button class="tab-button" data-tab="explore" type="button">
          Explore Metrics
        </button>
      </aside>

      <section class="workspace">
        <section id="panel-chatbot" class="panel active" aria-label="Chatbot panel">
          <header class="panel-header">
            <h2>ANZ Analyst Bot</h2>
            <p>Explore any key metrics of ANZ</p>
          </header>

          <section id="chat" class="chat" aria-live="polite"></section>

          <form id="composer" class="composer" autocomplete="off">
            <input
              id="promptInput"
              type="text"
              placeholder="What do you want to discuss today?"
              aria-label="Prompt input"
              required
            />
          </form>
        </section>

        <section id="panel-explore" class="panel" aria-label="Explore metrics panel">
          <header class="panel-header">
            <h2>Explore Metrics</h2>
            <p>Select a metric to preview a sample insight.</p>
          </header>

          <div class="metric-controls">
            <label for="metricSelect">Metric</label>
            <select id="metricSelect">
              <option value="">Choose a metric</option>
            </select>
          </div>

          <p id="metricSample" class="metric-sample">
            Pick a metric to display a sample summary.
          </p>

          <section id="graphs" class="graphs" aria-label="Metric graphs"></section>
        </section>
      </section>
    </main>

    <script>
      window.API_TIME_INFO_URL = "{{ url_for('time_info') }}";
    </script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
